name: jvm-binding

# Builds the multi-platform fat jar (darwin/arm64 + linux/amd64 + linux/arm64) in one run on a
# macOS/arm64 runner — darwin is built natively, the two Linux targets are cross-compiled with Zig —
# then verifies the cross-compiled Linux library actually loads and runs on a real Linux runner.
on:
  push:
    branches: [main]
    paths: ["jvm/**", "cmd/libsqlglot/**", "probe/**", "expressions/**", "optimizer/**", "parser/**", "generator/**", "schema/**", "dialects/**", "tokens/**", "trie/**", ".github/workflows/jvm.yml"]
  workflow_dispatch: {}

jobs:
  build-fatjar:
    runs-on: macos-14 # Apple Silicon: builds darwin/arm64 natively; Zig cross-builds the Linux libs.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build fat jar (all native targets) + run darwin tests
        working-directory: jvm
        run: gradle --no-daemon -Psqlglot.native.all=true -Pzig="$(which zig)" build
      - name: Verify all three libs are bundled
        working-directory: jvm
        run: |
          jar=$(ls build/libs/*.jar | head -1)
          for t in darwin-arm64/libsqlglot.dylib linux-amd64/libsqlglot.so linux-arm64/libsqlglot.so; do
            unzip -l "$jar" | grep -q "native/$t" || { echo "missing native/$t in jar"; exit 1; }
          done
          echo "all 3 native libs present in $jar"
      - uses: actions/upload-artifact@v4
        with:
          name: sqlglot-go-jvm-fatjar
          path: jvm/build/libs/*.jar

  smoke-linux-amd64:
    needs: build-fatjar
    runs-on: ubuntu-latest # native linux/amd64 — runtime-verify the cross-compiled lib
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
      - uses: actions/download-artifact@v4
        with:
          name: sqlglot-go-jvm-fatjar
          path: dist
      - name: Extract linux/amd64 lib and run the FFM smoke
        run: |
          jar=$(ls dist/*.jar | head -1)
          mkdir -p out
          unzip -o "$jar" "native/linux-amd64/libsqlglot.so" -d out
          java --enable-native-access=ALL-UNNAMED jvm/ci/Smoke.java out/native/linux-amd64/libsqlglot.so
