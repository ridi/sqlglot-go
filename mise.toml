# Local toolchain for sqlglot-go, managed by mise (https://mise.jdx.dev). Run `mise install`.
#
# - go:     the core library + the cmd/libsqlglot c-shared entry point.
# - zig:    cross C compiler for the JVM binding's multi-platform native build
#           (`cd jvm && mise exec -- gradle build -Psqlglot.native.all=true`).
# - java:   to build/run the JVM binding (jvm/). Any standard JDK 22+ works — the binding is plain
#           FFM (java.lang.foreign) + a native lib, so it does NOT need GraalVM/Polyglot. Temurin 24
#           is the ubiquitous default; consumers supply their own JDK via the composite build anyway.
# - gradle: to build the JVM binding.
[tools]
go = "1.23"
zig = "0.16.0"
java = "temurin-24"
gradle = "8.14.5"
